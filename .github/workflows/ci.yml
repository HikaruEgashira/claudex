name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.0
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: shellcheck
        timeout-minutes: 5
        run: shellcheck claudex install.sh
