name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.3.0
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: shellcheck
        timeout-minutes: 5
        run: shellcheck claudex install.sh
