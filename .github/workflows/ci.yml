name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.0
        timeout-minutes: 5
        with:
          persist-credentials: false
      - name: shellcheck
        timeout-minutes: 5
        run: shellcheck claudex install.sh
